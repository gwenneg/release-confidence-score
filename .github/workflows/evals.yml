name: AI Evals

on:
  pull_request:
    paths:
      - 'docs/**'
      - '.claude/**'
      - 'CLAUDE.md'
      - 'AGENTS.md'
      - 'promptfoo.yaml'

permissions:
  contents: read
  pull-requests: write

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: promptfoo/promptfoo-action@831a1d11a7e8fd86203865d125f119336866880f # v1
        with:
          config: promptfoo.yaml
          cache-path: ~/.cache/promptfoo
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}
